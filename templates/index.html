<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Showcase Calendar – Book a Time</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📅 Showcase Calendar</h1>
    <div class="subtitle">Book a meeting at a time that suits you</div>
  </div>

  <div id="login-section" class="login-section">
    <button class="book-btn connect-google" onclick="window.location.href='/login'">
      🔗 Connect Google Calendar
    </button>
  </div>

  <div id="main-content" style="display:none;">

    <div class="week-nav">
      <button onclick="changeWeek(-1)">←</button>
      <div class="week-title" id="week-title">Week 10, 2026</div>
      <button onclick="changeWeek(1)">→</button>
    </div>

    <div class="calendar-grid" id="calendar-grid"></div>

    <div class="booking-form" id="booking-form">
      <div class="selected-info" id="selected-info"></div>
      <input type="text" id="name" placeholder="Your full name" required />
      <input type="email" id="email" placeholder="Your email address" required />
      <button class="book-btn" onclick="bookMeeting()">Confirm Booking</button>
    </div>

    <div class="confirmation" id="confirmation">
      <div class="icon">🎉</div>
      <h2>Meeting Booked!</h2>
      <p>Check your email for the calendar invitation.</p>
      <button class="book-btn new-booking" onclick="location.reload()">
        Book Another Meeting
      </button>
    </div>

  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
